<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🥠 Fortune Cookie</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f7e7c6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }
  h1 {
    margin-bottom: 20px;
    color: #8b5a2b;
  }
  .cookie {
    width: 160px;
    height: 110px;
    background: #d8a45d;
    border-radius: 50% 50% 45% 45%;
    position: relative;
    cursor: pointer;
    transition: transform 0.3s ease;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  }
  /* Crack line */
  .cookie::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 10%;
    width: 80%;
    height: 2px;
    background: #8b5a2b;
    opacity: 0;
    transform: scaleX(0);
    transition: all 0.4s ease;
  }
  /* OPEN STATE */
  .cookie.open {
    animation: crack 0.6s forwards;
  }
  .cookie.open::after {
    opacity: 1;
    transform: scaleX(1);
  }
  @keyframes crack {
    0% { transform: scale(1) rotate(0); }
    40% { transform: scale(1.1) rotate(-5deg); }
    60% { transform: scale(1.1) rotate(5deg); }
    100% { transform: scale(0.9) rotate(0); }
  }
  .fortune {
    margin-top: 30px;
    padding: 15px 20px;
    background: white;
    border-radius: 8px;
    display: none;
    max-width: 320px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    animation: fadeIn 0.5s ease forwards;
    font-size: 1.1em;
    line-height: 1.4;
  }
  .fortune.show {
    display: block;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .reset-btn {
    margin-top: 20px;
    padding: 10px 20px;
    background: #d8a45d;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1em;
  }
</style>
</head>
<body>
<h1>🥠 Fortune Cookie</h1>
<div class="cookie" id="cookie"></div>
<div class="fortune" id="fortune"></div>
<button class="reset-btn" id="reset">Crack Another Cookie</button>

<!-- Sound -->
<audio id="crackSound" preload="auto">
  <source src="https://www.soundjay.com/human/sounds/bite-crunch-01.mp3" type="audio/mpeg">
</audio>

<script>
  const fortunes = {
    good: [
      "You will have a great day.",
      "Success is coming your way.",
      "A pleasant surprise awaits you.",
      "You will achieve something important soon.",
      "Good news will reach you soon."
    ],
    neutral: [
      "Today will be... a day.",
      "Things may stay exactly the same.",
      "You will eat something today.",
      "Nothing unexpected will happen.",
      "Life continues as usual."
    ],
    bad: [
      "You may stub your toe soon.",
      "Plans might not go as expected.",
      "Be cautious today.",
      "Something minor will annoy you.",
      "Watch out for small inconveniences."
    ]
  };

  function getRandom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function generateFortune() {
    const types = ["good", "neutral", "bad"];
    const type = getRandom(types);
    return getRandom(fortunes[type]);
  }

  const cookie = document.getElementById("cookie");
  const fortuneBox = document.getElementById("fortune");
  const sound = document.getElementById("crackSound");
  const resetBtn = document.getElementById("reset");

  function openCookie() {
    const fortuneText = generateFortune();
    fortuneBox.textContent = fortuneText;

    cookie.classList.add("open");
    fortuneBox.classList.add("show");
    sound.currentTime = 0;
    sound.play().catch(() => {}); // ignore autoplay restrictions
  }

  function resetCookie() {
    cookie.classList.remove("open");
    fortuneBox.classList.remove("show");
    
    // Small delay so the animation looks clean
    setTimeout(() => {
      openCookie();
    }, 300);
  }

  // Open the first cookie automatically when page loads
  window.onload = () => {
    openCookie();
  };

  cookie.addEventListener("click", () => {
    if (!cookie.classList.contains("open")) {
      openCookie();
    }
  });

  resetBtn.addEventListener("click", resetCookie);
</script>
</body>
</html>
